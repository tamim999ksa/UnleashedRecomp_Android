name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      os:
        description: 'Target OS'
        required: true
        type: choice
        options:
          - android
          - linux
          - windows
        default: 'android'
      game_url:
        description: 'URL for game data (ISO/XEX/ZIP/7Z/RAR) - always required for compilation'
        required: true
        type: string
      update_url:
        description: 'URL for update data (default.xexp/ZIP/7Z/RAR) (optional)'
        required: false
        type: string
      dlc_url:
        description: 'URL for dlc data (shader.ar/ZIP/7Z/RAR) (optional)'
        required: false
        type: string
      embed_game_files:
        description: 'Embed game files in APK (no manual file copy needed on device, increases APK size)'
        required: false
        type: boolean
        default: true

jobs:
  prepare-assets:
    name: Prepare Assets
    runs-on: ubuntu-24.04
    env:
      ASSET_REPO: ${{ secrets.ASSET_REPO }}
      ASSET_REPO_TOKEN: ${{ secrets.ASSET_REPO_TOKEN }}
    outputs:
      has_assets: ${{ steps.check-assets.outputs.has_assets }}
      has_game_data: ${{ steps.package-game-data.outputs.has_game_data }}
    steps:
      - name: Free Disk Space (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force
          sudo apt-get clean


      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout Private Repository
        if: ${{ env.ASSET_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.ASSET_REPO }}
          token: ${{ secrets.ASSET_REPO_TOKEN }}
          path: private

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full wget cmake build-essential libcurl4-openssl-dev

      - name: Setup extract-xiso
        run: |
          git clone https://github.com/XboxDev/extract-xiso.git
          cd extract-xiso
          # Patch extract-xiso to ignore EEXIST
          sed -i "s|if ( ( err = mkdir( dir->filename, 0755 ) ) ) mkdir_err( dir->filename );|if ( ( err = mkdir( dir->filename, 0755 ) ) ) { if ( errno == EEXIST ) err = 0; else mkdir_err( dir->filename ); }|" extract-xiso.c
          sed -i "s|if ( ( err = mkdir( iso_name, 0755 ) ) ) mkdir_err( iso_name );|if ( ( err = mkdir( iso_name, 0755 ) ) ) { if ( errno == EEXIST ) err = 0; else mkdir_err( iso_name ); }|" extract-xiso.c
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          sudo make install
          cd ../..
          rm -rf extract-xiso

      - name: Download Data
        if: ${{ github.event_name == 'workflow_dispatch' || env.ASSET_REPO != '' }}
        env:
          GAME_URL: ${{ github.event.inputs.game_url }}
          UPDATE_URL: ${{ github.event.inputs.update_url }}
          DLC_URL: ${{ github.event.inputs.dlc_url }}
        run: |
          mkdir -p ./UnleashedRecompLib/private

          handle_url() {
            local url="$1"
            if [ -z "$url" ]; then return 0; fi
            echo "::add-mask::${url}"
            # Use --content-disposition to preserve original filenames
            wget --no-check-certificate --content-disposition --tries=3 --retry-connrefused --waitretry=5 -q -P ./UnleashedRecompLib/private/ "${url}"
          }

          handle_url "$GAME_URL"
          handle_url "$UPDATE_URL"
          handle_url "$DLC_URL"

          if [ -d "./private" ]; then
            cp -rv private/* ./UnleashedRecompLib/private/ 2>/dev/null || true
          fi

          # Recursive extraction
          for i in {1..15}; do
            nested=$(find ./UnleashedRecompLib/private -type f \( -iname "*.iso" -o -iname "*.7z" -o -iname "*.zip" -o -iname "*.rar" -o -iname "TU_*" -o -iname "*.tar*" -o -iregex ".*/[0-9a-fA-F]\\{8,42\\}" \) -not -name "*.skipped" -not -name "*.extracted" | head -n 1)
            if [ -z "$nested" ]; then break; fi

            filename=$(basename "$nested")
            extension="${filename##*.}"
            is_iso=0
            if [[ "$extension" =~ ^(iso|ISO)$ ]]; then is_iso=1; fi

            success=0
            # Try 7z first for generic archives, then specialized tools
            if 7z x -y "$nested" -o./UnleashedRecompLib/private/ > /dev/null 2>&1; then
              success=1
            elif [ "$is_iso" -eq 1 ] && (extract-xiso -x "$nested" -d ./UnleashedRecompLib/private/ || python3 tools/extract_xgd.py "$nested" ./UnleashedRecompLib/private/); then
              success=1
            elif [ "$is_iso" -eq 0 ] && python3 tools/extract_stfs.py "$nested" ./UnleashedRecompLib/private/; then
              success=1
            fi

            if [ "$success" -eq 1 ]; then rm -f "$nested"; else mv "$nested" "${nested}.skipped"; fi
          done

          # Robust Normalization
          finalize_file() {
            local filename="$1"
            local target_path="./UnleashedRecompLib/private/$filename"
            local candidates=$(find ./UnleashedRecompLib/private -type f -iname "$filename" | { grep -vFx "$target_path" || true; })
            local candidate_count=$(echo "$candidates" | grep -v "^$" | wc -l || true)
            if [ "$candidate_count" -gt 0 ]; then
                local found_file=""
                if [ "$candidate_count" -gt 1 ]; then
                    found_file=$(echo "$candidates" | grep -vE "/(game|base)/" | head -n 1)
                    if [ -z "$found_file" ]; then found_file=$(echo "$candidates" | head -n 1); fi
                else
                    found_file="$candidates"
                fi
                if [ -n "$found_file" ]; then mv -f "$found_file" "$target_path"; fi
            fi
            # Case fix for root files
            local root_file=$(find ./UnleashedRecompLib/private -maxdepth 1 -type f -iname "$filename" | head -n 1)
            if [ -n "$root_file" ] && [ "$root_file" != "$target_path" ]; then mv -f "$root_file" "$target_path"; fi
          }

          finalize_file "default.xex"
          finalize_file "default.xexp"
          finalize_file "shader.ar"

          # Cleanup empty directories
          find ./UnleashedRecompLib/private -depth -type d -empty -delete 2>/dev/null || true

      - name: Check Assets and Upload
        id: check-assets
        run: |
          if [ -f "./UnleashedRecompLib/private/default.xex" ] && [ -f "./UnleashedRecompLib/private/shader.ar" ]; then
            echo "has_assets=true" >> $GITHUB_OUTPUT
            echo "Assets found, uploading..."
          else
            echo "has_assets=false" >> $GITHUB_OUTPUT
            if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ env.ASSET_REPO }}" != "" ]; then
              echo "Error: Mandatory assets (default.xex, shader.ar) missing after extraction."
              false
            else
              echo "Warning: Mandatory assets missing."
            fi
          fi

      - name: Upload Prepared Assets
        if: steps.check-assets.outputs.has_assets == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prepared-assets
          path: ./UnleashedRecompLib/private/
          retention-days: 1

      - name: Install zstd
        if: steps.check-assets.outputs.has_assets == 'true' && (inputs.os == 'android' || inputs.os == '')
        run: sudo apt-get install -y zstd

      - name: Package Game Data
        id: package-game-data
        if: steps.check-assets.outputs.has_assets == 'true' && (inputs.os == 'android' || inputs.os == '')
        run: |
          echo "=== Organizing game files into install structure ==="
          PRIVATE="./UnleashedRecompLib/private"
          GAME_DATA="./game_data_staging"

          mkdir -p "$GAME_DATA/game"
          mkdir -p "$GAME_DATA/update"

          # The extracted game disc content is in $PRIVATE after recursive extraction.
          # Copy all files that are NOT the finalized compile-time assets into game/.
          # The installer checks for: game/default.xex, update/default.xexp, patched/default.xex

          # Move update file
          if [ -f "$PRIVATE/default.xexp" ]; then
            cp "$PRIVATE/default.xexp" "$GAME_DATA/update/default.xexp"
            echo "Copied update patch (default.xexp)"
          fi

          # Copy all remaining game disc files to game/ directory
          # This includes .ar files, .arl files, .sfd, .dds, voices, fonts, default.xex, etc.
          find "$PRIVATE" -maxdepth 1 -type f ! -name "*.skipped" ! -name "*.extracted" | while read -r f; do
            basename_f=$(basename "$f")
            # default.xexp already handled
            if [ "$basename_f" = "default.xexp" ]; then continue; fi
            cp "$f" "$GAME_DATA/game/$basename_f"
          done

          # Copy any subdirectories (voices, Languages, reddog, work, etc.)
          find "$PRIVATE" -maxdepth 1 -mindepth 1 -type d | while read -r d; do
            dirname_d=$(basename "$d")
            cp -r "$d" "$GAME_DATA/game/$dirname_d"
          done

          # Ensure default.xex is in game/
          if [ ! -f "$GAME_DATA/game/default.xex" ]; then
            echo "Warning: default.xex not found in game directory"
          fi

          # Create patched directory with XEX patcher
          # The build tools job will handle patching, or we create a placeholder.
          # The native code Installer will do patching at runtime if needed.
          # For a complete embedded install, we pre-patch using the host tools.
          if [ -f "$GAME_DATA/game/default.xex" ] && [ -f "$GAME_DATA/update/default.xexp" ]; then
            echo "=== Building XexPatcher for host ==="
            mkdir -p build_patcher && cd build_patcher
            cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TOOLS_ONLY=ON 2>/dev/null || true
            cmake --build . --target XenonRecomp --parallel $(nproc) 2>/dev/null || true
            cd ..

            # Try to find a patcher tool; if not available, the game will patch at runtime
            PATCHER=$(find ./build_patcher -name "XenonRecomp" -type f -executable 2>/dev/null | head -n 1)
            if [ -z "$PATCHER" ]; then
              echo "XexPatcher not available for host, game will self-patch at first launch"
              # Create patched/ with a copy; the game re-patches at runtime
              mkdir -p "$GAME_DATA/patched"
              cp "$GAME_DATA/game/default.xex" "$GAME_DATA/patched/default.xex"
            fi
            rm -rf build_patcher
          fi

          echo "=== Creating compressed game data archive ==="
          GAME_FILE_COUNT=$(find "$GAME_DATA" -type f | wc -l)
          GAME_DIR_SIZE=$(du -sh "$GAME_DATA" | cut -f1)
          echo "Game data: $GAME_FILE_COUNT files, $GAME_DIR_SIZE total"

          # Create tar archive and compress with zstd.
          # -T0: use all CPU cores for multithreaded compression
          # -10: high compression (smaller download, same decompression speed as any level)
          # --long: enable long-range matching for better ratio on large archives
          tar cf - -C "$GAME_DATA" . | zstd -T0 -10 --long -o ./game_data.tar.zst
          ARCHIVE_SIZE=$(du -sh ./game_data.tar.zst | cut -f1)
          echo "Compressed archive: $ARCHIVE_SIZE"

          echo "has_game_data=true" >> $GITHUB_OUTPUT

          # Cleanup staging to free disk
          rm -rf "$GAME_DATA"

      - name: Split Game Data for APK Embedding
        id: split-game-data
        if: steps.package-game-data.outputs.has_game_data == 'true' && inputs.embed_game_files == true
        run: |
          # Split into <1GB chunks to avoid Java's 2GB array size limit during APK packaging.
          # Gradle's CompressAssetsWorkAction reads each asset file into a byte array, which
          # fails with OutOfMemoryError for files exceeding Integer.MAX_VALUE (~2.1GB).
          CHUNK_SIZE=$((1024 * 1024 * 1024))
          mkdir -p ./game_data_chunks
          split -b $CHUNK_SIZE -d --suffix-length=3 --additional-suffix=.zst ./game_data.tar.zst ./game_data_chunks/game_data_part_
          NUM_CHUNKS=$(ls ./game_data_chunks/game_data_part_*.zst | wc -l)
          echo "Split into $NUM_CHUNKS chunk(s)"
          ls -lh ./game_data_chunks/

      - name: Upload Game Data Chunks (for APK embedding)
        if: steps.split-game-data.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: game-data-archive
          path: ./game_data_chunks/
          retention-days: 1
          compression-level: 0

      - name: Upload Game Data (standalone sideload archive)
        if: steps.package-game-data.outputs.has_game_data == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: UnleashedRecomp-GameData
          path: ./game_data.tar.zst
          retention-days: 7
          compression-level: 0

  build:
    name: Build (${{ inputs.os || 'android' }})
    needs: prepare-assets
    if: needs.prepare-assets.outputs.has_assets == 'true' || github.event_name == 'push'
    runs-on: ${{ (inputs.os == 'windows') && 'windows-latest' || 'ubuntu-24.04' }}
    env:
      OS: ${{ inputs.os || 'android' }}
      CMAKE_BUILD_PARALLEL_LEVEL: 2
    defaults:
      run:
        shell: bash
    steps:
      - name: Free Disk Space (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force
          sudo apt-get clean
          df -h

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Prepared Assets
        if: needs.prepare-assets.outputs.has_assets == 'true'
        uses: actions/download-artifact@v4
        with:
          name: prepared-assets
          path: ./UnleashedRecompLib/private/

      - name: Cache vcpkg
        if: env.OS == 'android' || env.OS == 'linux'
        uses: actions/cache@v4
        with:
          path: |
            ./thirdparty/vcpkg/downloads
            ./thirdparty/vcpkg/packages
          key: vcpkg-${{ env.OS }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
              vcpkg-${{ env.OS }}-

      - name: Setup Java
        if: env.OS == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        if: env.OS == 'android'
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: env.OS == 'android'
        run: echo y | sdkmanager "ndk;29.0.14206865"

      - name: Trim Android SDK
        if: env.OS == 'android'
        run: |
          rm -rf "$ANDROID_SDK_ROOT/emulator" || true
          df -h

      - name: Bootstrap vcpkg
        if: env.OS == 'android' || env.OS == 'linux'
        run: ./thirdparty/vcpkg/bootstrap-vcpkg.sh

      - name: Setup Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libtbb-dev libcurl4-openssl-dev patchelf p7zip-full

      - name: Setup Build Tools
        if: runner.os == 'Linux'
        run: |
          chmod +x ./build_tools.sh
          ./build_tools.sh

      - name: Apply Patches
        run: |
          chmod +x ./apply_patches.sh
          ./apply_patches.sh

      - name: Setup Swap Space
        if: env.OS == 'android'
        run: |
          sudo swapoff /swapfile || true
          sudo rm -f /swapfile
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo sysctl -w vm.swappiness=100
          sudo sysctl -w vm.overcommit_memory=1
          free -h

      - name: Embed Game Data in APK Assets
        if: env.OS == 'android' && needs.prepare-assets.outputs.has_game_data == 'true' && inputs.embed_game_files == true
        uses: actions/download-artifact@v4
        with:
          name: game-data-archive
          path: ./android/app/src/main/assets/

      - name: Verify Embedded Assets
        if: env.OS == 'android' && needs.prepare-assets.outputs.has_game_data == 'true' && inputs.embed_game_files == true
        run: |
          ASSET_DIR="./android/app/src/main/assets"
          CHUNKS=$(find "$ASSET_DIR" -name "game_data_part_*.zst" 2>/dev/null | sort)
          if [ -n "$CHUNKS" ]; then
            TOTAL_SIZE=0
            for chunk in $CHUNKS; do
              CHUNK_SIZE=$(stat -c%s "$chunk")
              TOTAL_SIZE=$((TOTAL_SIZE + CHUNK_SIZE))
              echo "Chunk: $(basename $chunk) - $(du -sh $chunk | cut -f1)"
            done
            echo "Total embedded game data: $(echo $CHUNKS | wc -w) chunk(s), $((TOTAL_SIZE / 1024 / 1024))MB"
          elif [ -f "$ASSET_DIR/game_data.tar.zst" ]; then
            echo "Embedded game data (single file): $(du -sh $ASSET_DIR/game_data.tar.zst | cut -f1)"
          else
            echo "Warning: No game data chunks found in assets"
          fi
          df -h

      - name: Build APK (Android)
        if: env.OS == 'android'
        working-directory: android
        run: |
          chmod +x gradlew
          export ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/29.0.14206865
          export GRADLE_OPTS="-Xmx2048m -XX:+UseSerialGC -XX:MinHeapFreeRatio=20 -XX:MaxHeapFreeRatio=25 -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.workers.max=1"
          ./gradlew assembleRelease --stacktrace --max-workers=1 --no-daemon

      - name: Build Linux
        if: env.OS == 'linux'
        run: |
          mkdir -p build_linux && cd build_linux
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="../thirdparty/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DHOST_TOOLS_DIR="../build_tools/bin"
          cmake --build . --config Release --parallel $(nproc)

      - name: Build Windows
        if: env.OS == 'windows'
        run: |
          mkdir -p build_windows && cd build_windows
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="../thirdparty/vcpkg/scripts/buildsystems/vcpkg.cmake"
          cmake --build . --config Release --parallel

      - name: Upload Android APK
        if: env.OS == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: UnleashedRecomp-Android-APK
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload Desktop Artifacts
        if: env.OS == 'linux' || env.OS == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: UnleashedRecomp-${{ env.OS }}
          path: |
            build_${{ env.OS }}/Release/*
            build_${{ env.OS }}/bin/*
            build_${{ env.OS }}/*.exe
            build_${{ env.OS }}/${{ env.OS == 'linux' && 'UnleashedRecomp' || '' }}
            !build_${{ env.OS }}/**/*.o
            !build_${{ env.OS }}/**/*.a
