name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      os:
        description: 'Target OS'
        required: true
        type: choice
        options:
          - android
          - linux
          - windows
        default: 'android'
      game_url:
        description: 'URL for game data (ISO/XEX/ZIP/7Z/RAR)'
        required: true
        type: string
      update_url:
        description: 'URL for update data (default.xexp/ZIP/7Z/RAR) (optional)'
        required: false
        type: string
      dlc_url:
        description: 'URL for dlc data (shader.ar/ZIP/7Z/RAR) (optional)'
        required: false
        type: string

jobs:
  prepare-assets:
    name: Prepare Assets
    runs-on: ubuntu-24.04
    env:
      ASSET_REPO: ${{ secrets.ASSET_REPO }}
      ASSET_REPO_TOKEN: ${{ secrets.ASSET_REPO_TOKEN }}
    outputs:
      has_assets: ${{ steps.check-assets.outputs.has_assets }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout Private Repository
        if: ${{ env.ASSET_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.ASSET_REPO }}
          token: ${{ secrets.ASSET_REPO_TOKEN }}
          path: private

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full wget cmake build-essential libcurl4-openssl-dev

      - name: Setup extract-xiso
        run: |
          git clone https://github.com/XboxDev/extract-xiso.git
          cd extract-xiso
          # Patch extract-xiso to ignore EEXIST
          sed -i "s|if ( ( err = mkdir( dir->filename, 0755 ) ) ) mkdir_err( dir->filename );|if ( ( err = mkdir( dir->filename, 0755 ) ) ) { if ( errno != EEXIST ) mkdir_err( dir->filename ); else err = 0; }|" extract-xiso.c
          sed -i "s|if ( ( err = mkdir( iso_name, 0755 ) ) ) mkdir_err( iso_name );|if ( ( err = mkdir( iso_name, 0755 ) ) ) { if ( errno != EEXIST ) mkdir_err( iso_name ); else err = 0; }|" extract-xiso.c
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          sudo make install

      - name: Download Data
        if: ${{ github.event_name == 'workflow_dispatch' || env.ASSET_REPO != '' }}
        env:
          GAME_URL: ${{ inputs.game_url }}
          UPDATE_URL: ${{ inputs.update_url }}
          DLC_URL: ${{ inputs.dlc_url }}
        run: |
          mkdir -p ./UnleashedRecompLib/private

          handle_url() {
            local url="$1"
            local target_name="$2"
            local dest_file="./UnleashedRecompLib/private/download_${target_name}"
            if [ -z "$url" ]; then return 0; fi
            echo "::add-mask::${url}"
            wget --no-check-certificate --content-disposition --tries=3 --retry-connrefused --waitretry=5 -qO "${dest_file}" "${url}"
          }

          handle_url "$GAME_URL" "game"
          handle_url "$UPDATE_URL" "default.xexp"
          handle_url "$DLC_URL" "shader.ar"

          if [ -d "./private" ]; then
            find ./private -maxdepth 5 -type f -iname "default.xex" -exec cp -f {} ./UnleashedRecompLib/private/default.xex \; 2>/dev/null || true
            find ./private -maxdepth 5 -type f -iname "default.xexp" -exec cp -f {} ./UnleashedRecompLib/private/default.xexp \; 2>/dev/null || true
            find ./private -maxdepth 5 -type f -iname "shader.ar" -exec cp -f {} ./UnleashedRecompLib/private/shader.ar \; 2>/dev/null || true
          fi

          # Recursive extraction
          for i in {1..15}; do
            nested=$(find ./UnleashedRecompLib/private -type f \( -iname "*.iso" -o -iname "*.7z" -o -iname "*.zip" -o -iname "*.rar" -o -iname "TU_*" -o -iname "*.tar*" -o -iname "download_*" -o -iregex ".*/[0-9A-F]\\{8,42\\}" \) -not -name "*.skipped" | head -n 1)
            if [ -z "$nested" ]; then break; fi
            success=0
            if [[ "$nested" =~ \.[Ii][Ss][Oo]$ ]]; then
               extract-xiso -x "$nested" -d ./UnleashedRecompLib/private/ && success=1 || (python3 tools/extract_xgd.py "$nested" ./UnleashedRecompLib/private/ && success=1)
            elif python3 tools/extract_stfs.py "$nested" ./UnleashedRecompLib/private/ ; then
              success=1
            elif 7z x -y "$nested" -o./UnleashedRecompLib/private/ ; then
              success=1
            fi
            if [ "$success" -eq 1 ]; then rm -f "$nested"; else mv "$nested" "${nested}.skipped"; fi
          done

          # Normalize
          game_root=$(find ./UnleashedRecompLib/private -name "default.xex" -o -name "DEFAULT.XEX" | head -n 1)
          if [ -n "$game_root" ]; then
            game_dir=$(dirname "$game_root")
            if [ "$game_dir" != "./UnleashedRecompLib/private" ]; then
              cp -rn "$game_dir"/* ./UnleashedRecompLib/private/ 2>/dev/null || true
            fi
          fi

          find ./UnleashedRecompLib/private -depth -not -name "*.skipped" | while read -r src; do
            if [ -d "$src" ]; then rmdir "$src" 2>/dev/null || true; else
              dir=$(dirname "$src"); base=$(basename "$src"); new_base=$(echo "$base" | tr '[:upper:]' '[:lower:]' | tr -d ' ')
              if [ "$base" != "$new_base" ]; then mv -f "$src" "$dir/$new_base" 2>/dev/null || true; fi
            fi
          done

      - name: Check Assets and Upload
        id: check-assets
        run: |
          if [ -f "./UnleashedRecompLib/private/default.xex" ] && [ -f "./UnleashedRecompLib/private/shader.ar" ]; then
            echo "has_assets=true" >> $GITHUB_OUTPUT
            echo "Assets found, uploading..."
          else
            echo "has_assets=false" >> $GITHUB_OUTPUT
            echo "Warning: Mandatory assets missing."
          fi

      - name: Upload Prepared Assets
        if: steps.check-assets.outputs.has_assets == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prepared-assets
          path: ./UnleashedRecompLib/private/
          retention-days: 1

  build:
    name: Build (${{ inputs.os || 'android' }})
    needs: prepare-assets
    runs-on: ${{ (inputs.os == 'windows') && 'windows-latest' || 'ubuntu-24.04' }}
    env:
      OS: ${{ inputs.os || 'android' }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Prepared Assets
        if: needs.prepare-assets.outputs.has_assets == 'true'
        uses: actions/download-artifact@v4
        with:
          name: prepared-assets
          path: ./UnleashedRecompLib/private/

      - name: Setup Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libtbb-dev libcurl4-openssl-dev patchelf p7zip-full

      - name: Setup Build Tools
        run: |
          chmod +x ./build_tools.sh
          ./build_tools.sh

      - name: Apply Patches
        run: |
          chmod +x ./apply_patches.sh
          ./apply_patches.sh

      - name: Build APK (Android)
        if: env.OS == 'android'
        working-directory: android
        run: |
          chmod +x gradlew
          export ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/29.0.14206865
          export GRADLE_OPTS="-Xmx4096m -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=$(nproc)"
          ./gradlew assembleRelease --stacktrace --max-workers=1

      - name: Build Linux
        if: env.OS == 'linux'
        run: |
          mkdir -p build_linux && cd build_linux
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="../thirdparty/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DHOST_TOOLS_DIR="../build_tools/bin"
          cmake --build . --config Release --parallel $(nproc)

      - name: Build Windows
        if: env.OS == 'windows'
        run: |
          mkdir -p build_windows && cd build_windows
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="../thirdparty/vcpkg/scripts/buildsystems/vcpkg.cmake"
          cmake --build . --config Release --parallel

      - name: Upload Android APK
        if: env.OS == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: UnleashedRecomp-Android-APK
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload Desktop Artifacts
        if: env.OS == 'linux' || env.OS == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: UnleashedRecomp-${{ env.OS }}
          path: |
            build_${{ env.OS }}/Release/*
            build_${{ env.OS }}/bin/*
            build_${{ env.OS }}/*.exe
            build_${{ env.OS }}/${{ env.OS == 'linux' && 'UnleashedRecomp' || '' }}
            !build_${{ env.OS }}/**/*.o
            !build_${{ env.OS }}/**/*.a
