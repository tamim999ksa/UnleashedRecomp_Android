# Release Workflow

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      os:
        description: 'Target OS'
        required: true
        type: choice
        options:
          - android
          - linux
          - windows
        default: 'android'
      game_url:
        description: 'URL for game data (ISO/XEX/ZIP/7Z/RAR)'
        required: true
        type: string
      update_url:
        description: 'URL for update data (default.xexp/ZIP/7Z/RAR) (optional)'
        required: false
        type: string
      dlc_url:
        description: 'URL for dlc data (shader.ar/ZIP/7Z/RAR) (optional)'
        required: false
        type: string

jobs:
  build:
    runs-on: ${{ (inputs.os == 'windows') && 'windows-latest' || 'ubuntu-24.04' }}
    env:
      ASSET_REPO: ${{ secrets.ASSET_REPO }}
      ASSET_REPO_TOKEN: ${{ secrets.ASSET_REPO_TOKEN }}

    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout Private Repository
        if: ${{ runner.os == 'Linux' && env.ASSET_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ASSET_REPO }}
          token: ${{ env.ASSET_REPO_TOKEN }}
          path: ./private

      - name: Setup System (Linux/Android)
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf p7zip-full wget file ccache libtbb-dev libcurl4-openssl-dev
          # Memory optimizations for the build runner
          sudo sysctl -w vm.swappiness=10
          sudo sysctl -w vm.vfs_cache_pressure=50

      - name: Set up JDK (Android only)
        if: ${{ (inputs.os == 'android' || github.event_name == 'push') }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK (Android only)
        if: ${{ (inputs.os == 'android' || github.event_name == 'push') }}
        uses: android-actions/setup-android@v3.2.1

      - name: Install Android NDK (Android only)
        if: ${{ (inputs.os == 'android' || github.event_name == 'push') }}
        run: echo y | sdkmanager "ndk;29.0.14206865"

      - name: Apply Patches
        if: ${{ runner.os == 'Linux' }}
        run: |
          chmod +x apply_patches.sh
          ./apply_patches.sh

      - name: Cache vcpkg (Linux/Windows)
        if: ${{ inputs.os != '' || github.event_name == 'push' }}
        uses: actions/cache@v4
        with:
          path: |
            ./thirdparty/vcpkg/downloads
            ./thirdparty/vcpkg/packages
          key: vcpkg-${{ inputs.os || 'android' }}-${{ hashFiles('vcpkg.json') }}

      - name: Bootstrap vcpkg (Linux/Windows)
        if: ${{ inputs.os != '' || github.event_name == 'push' }}
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ./thirdparty/vcpkg/bootstrap-vcpkg.bat
          else
            ./thirdparty/vcpkg/bootstrap-vcpkg.sh
          fi

      - name: Build Host Tools
        if: ${{ runner.os == 'Linux' }}
        run: |
          chmod +x build_tools.sh
          # Ensure dxc-linux is executable for build_tools.sh
          find tools/XenosRecomp/thirdparty/dxc-bin/bin -type f -name "dxc-linux" -exec chmod +x {} +
          ./build_tools.sh

      - name: Download Data
        if: ${{ runner.os == 'Linux' && (github.event_name == 'workflow_dispatch' || env.ASSET_REPO != '') }}
        env:
          GAME_URL: ${{ inputs.game_url }}
          UPDATE_URL: ${{ inputs.update_url }}
          DLC_URL: ${{ inputs.dlc_url }}
        run: |
          mkdir -p ./UnleashedRecompLib/private

          handle_url() {
            local url="$1"
            local target_name="$2"
            local temp_file="${{ runner.temp }}/$(basename "$target_name")_data"

            if [ -z "$url" ]; then
              echo "Warning: No URL provided for $target_name"
              return 0
            fi

            echo "Downloading $target_name from URL (masked for safety)..."
            echo "::add-mask::$url"

            if ! wget --no-check-certificate --content-disposition -qO "$temp_file" "$url"; then
              echo "Error: Failed to download $target_name"
              return 1
            fi

            if [ ! -s "$temp_file" ]; then
              echo "Error: Downloaded file for $target_name is empty!"
              rm -f "$temp_file"
              return 1
            fi

            # Check for archive type
            if 7z l "$temp_file" > /dev/null 2>&1; then
               echo "Detected archive for $target_name, extracting..."
               if ! 7z x -y "$temp_file" -o./UnleashedRecompLib/private/; then
                 echo "Error: Failed to extract $target_name archive"
                 rm -f "$temp_file"
                 return 1
               fi
               rm -f "$temp_file"
            else
               # Check for ISO or raw file
               local file_type=$(file "$temp_file")
               if echo "$file_type" | grep -qi "iso"; then
                  echo "Detected ISO file for $target_name, extracting contents..."
                  if ! 7z x -y "$temp_file" -o./UnleashedRecompLib/private/; then
                    echo "Warning: Failed to extract ISO contents cleanly, proceeding anyway..."
                  fi
                  rm -f "$temp_file"
               else
                  case "$target_name" in
                    game)
                      echo "Assuming raw XEX file for game"
                      mv "$temp_file" ./UnleashedRecompLib/private/default.xex
                      ;;
                    *)
                      echo "Using raw file as $target_name"
                      mv "$temp_file" "./UnleashedRecompLib/private/$target_name"
                      ;;
                  esac
               fi
            fi
            return 0
          }

          # Download all provided URLs
          handle_url "$GAME_URL" "game" || exit 1
          handle_url "$UPDATE_URL" "default.xexp" || exit 1
          handle_url "$DLC_URL" "shader.ar" || exit 1

          # Handle data from private repo if checked out
          if [ -d "./private" ]; then
            echo "Copying data from private repository..."
            find ./private -maxdepth 5 -type f -iname "default.xex" -exec cp -f {} ./UnleashedRecompLib/private/default.xex \; 2>/dev/null || true
            find ./private -maxdepth 5 -type f -iname "default.xexp" -exec cp -f {} ./UnleashedRecompLib/private/default.xexp \; 2>/dev/null || true
            find ./private -maxdepth 5 -type f -iname "shader.ar" -exec cp -f {} ./UnleashedRecompLib/private/shader.ar \; 2>/dev/null || true
          fi

          # Recursive extraction: check if we extracted an ISO, another archive, or STFS container
            echo "Current contents of ./UnleashedRecompLib/private/ before finalization:"
            ls -R ./UnleashedRecompLib/private/
          echo "Checking for nested archives/ISOs/STFS in ./UnleashedRecompLib/private/..."
          # Max 5 levels of nesting
          for i in {1..5}; do
            # Find files that look like archives or STFS
            nested=$(find ./UnleashedRecompLib/private -type f \( -iname "*.iso" -o -iname "*.7z" -o -iname "*.zip" -o -iname "*.rar" -o -iname "TU_*" -o -iname "*.tar*" -o -iregex ".*/[0-9A-F]{8,42}" \) -not -name "*.skipped" -not -name "*.extracted" | head -n 1)

            if [ -z "$nested" ]; then
              break
            fi

            echo "Processing nested item (iteration $i): $nested"
            ls -R ./UnleashedRecompLib/private/
            ls -R ./UnleashedRecompLib/private/
            ls -R ./UnleashedRecompLib/private/

            # Use extension to decide extractor
            filename=$(basename "$nested")
            extension="${filename##*.}"
            is_iso=0
            if [ "$extension" == "iso" ] || [ "$extension" == "ISO" ]; then
                is_iso=1
            fi

            if 7z x -y "$nested" -o./UnleashedRecompLib/private/; then
              echo "Successfully extracted with 7z: $nested"
              mv "$nested" "${nested}.extracted"
            elif [ "$is_iso" -eq 1 ] && python3 tools/extract_xgd.py "$nested" ./UnleashedRecompLib/private/; then
              echo "Successfully extracted with extract_xgd.py: $nested"
              mv "$nested" "${nested}.extracted"
            elif [ "$is_iso" -eq 0 ] && python3 tools/extract_stfs.py "$nested" ./UnleashedRecompLib/private/; then
              echo "Successfully extracted with extract_stfs.py: $nested"
              mv "$nested" "${nested}.extracted"
            else
              if [ "$is_iso" -eq 1 ]; then
                 echo "Warning: 7z and extract_xgd.py failed to extract ISO $nested. It might be corrupted or an unsupported format."
              else
                 echo "Warning: Failed to extract $nested, skipping..."
              fi
              mv "$nested" "${nested}.skipped"
            fi
              mv "$nested" "${nested}.skipped"
            fi
          done

          # Final search and move to ensure files are at the root of private/ and lowercase
          echo "Organizing and normalizing files in ./UnleashedRecompLib/private/..."

          echo "Current contents of ./UnleashedRecompLib/private/ before finalization:"
          ls -R ./UnleashedRecompLib/private/
          finalize_file() {
            local filename="$1"
            local target_path="./UnleashedRecompLib/private/$filename"

            # Find the file case-insensitively, anywhere in private/, as a file
            local found_file=$(find ./UnleashedRecompLib/private -type f -iname "$filename" | { grep -vFx "$target_path" || true; } | head -n 1)
            local candidate_count=$(find ./UnleashedRecompLib/private -type f -iname "$filename" | { grep -vFx "$target_path" || true; } | wc -l)
            if [ "$candidate_count" -gt 1 ]; then
                echo "Warning: Multiple candidates for $filename found. Using the first one."
                find ./UnleashedRecompLib/private -type f -iname "$filename" | { grep -vFx "$target_path" || true; }
            fi

            if [ -n "$found_file" ]; then
              echo "Found $filename at $found_file, moving to root as $filename..."
              mv -f "$found_file" "$target_path"
            fi

            # If it's already at the root but with wrong case, fix it
            local root_file=$(find ./UnleashedRecompLib/private -maxdepth 1 -type f -iname "$filename" | head -n 1)
            if [ -n "$root_file" ] && [ "$root_file" != "$target_path" ]; then
                 echo "Fixing case for $root_file -> $target_path"
                 mv -f "$root_file" "$target_path"
            fi
          }

          finalize_file "default.xex"
          finalize_file "default.xexp"
          finalize_file "shader.ar"

          # Verification and diagnostics
          echo "Verifying mandatory assets..."
          missing_mandatory=0
          if [ ! -f "./UnleashedRecompLib/private/default.xex" ]; then
            echo "::error::Mandatory file default.xex not found!"
            missing_mandatory=1
          fi
          if [ ! -f "./UnleashedRecompLib/private/shader.ar" ]; then
            echo "::error::Mandatory file shader.ar not found!"
            missing_mandatory=1
          fi

          if [ "$missing_mandatory" -eq 1 ]; then
            echo "Current contents of ./UnleashedRecompLib/private/ (up to depth 5):"
            find ./UnleashedRecompLib/private/ -maxdepth 5 -not -path '*/.*'
            exit 1
          fi

          echo "Verification successful. Contents of ./UnleashedRecompLib/private/:"
          ls -lh ./UnleashedRecompLib/private/
      - name: Build APK (Android only)
        if: ${{ (inputs.os == 'android' || github.event_name == 'push') }}
        working-directory: android
        run: |
          chmod +x gradlew
          export ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/29.0.14206865
          # Memory optimization for Gradle
          export GRADLE_OPTS="-Xmx4096m -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=$(nproc)"
          ./gradlew assembleRelease --stacktrace --max-workers=1

      - name: Archive APK (Android only)
        if: ${{ (inputs.os == 'android' || github.event_name == 'push') }}
        run: |
          mkdir -p output/apk
          cp android/app/build/outputs/apk/release/app-release.apk output/apk/

      - name: Upload APK (Android only)
        if: ${{ (inputs.os == 'android' || github.event_name == 'push') }}
        uses: actions/upload-artifact@v4
        with:
          name: UnleashedRecomp-Android-APK
          path: output/apk/app-release.apk

      - name: Build Linux
        if: ${{ (inputs.os == 'linux') }}
        run: |
          echo "Building for Linux"
          mkdir -p build_linux
          cd build_linux

          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="../thirdparty/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DHOST_TOOLS_DIR="../build_tools/bin"

          cmake --build . --config Release --parallel $(nproc)

      - name: Build Windows
        if: ${{ (inputs.os == 'windows') }}
        run: |
          echo "Building for Windows"
          # On Windows we build host tools as part of the main build as they are native
          mkdir -p build_windows
          cd build_windows

          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="../thirdparty/vcpkg/scripts/buildsystems/vcpkg.cmake"

          cmake --build . --config Release --parallel

      - name: Upload Artifacts (Linux/Windows)
        if: ${{ inputs.os == 'linux' || inputs.os == 'windows' }}
        uses: actions/upload-artifact@v4
        with:
          name: UnleashedRecomp-${{ inputs.os }}
          path: |
            build_${{ inputs.os }}/Release/*
            build_${{ inputs.os }}/bin/*
            build_${{ inputs.os }}/*.exe
            build_${{ inputs.os }}/${{ inputs.os == 'linux' && 'UnleashedRecomp' || '' }}
            !build_${{ inputs.os }}/**/*.o
            !build_${{ inputs.os }}/**/*.a

      - name: Cleanup
        run: |
          echo 'Cleaning up temporary files'
          rm -rf output

      - name: Notify Success
        if: success() 
        run: |
          echo 'Build and release successful!'
