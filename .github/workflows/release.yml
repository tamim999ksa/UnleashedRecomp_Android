# Release Workflow

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      os:
        description: 'Target OS'
        required: true
        type: choice
        options:
          - android
          - linux
          - windows
        default: 'android'
      game_url:
        description: 'URL for game data (ISO/XEX/ZIP/7Z/RAR)'
        required: true
        type: string
      update_url:
        description: 'URL for update data (default.xexp) (optional)'
        required: false
        type: string
      dlc_url:
        description: 'URL for dlc data (shader.ar) (optional)'
        required: false
        type: string

jobs:
  build:
    runs-on: ${{ (inputs.os == 'windows') && 'windows-latest' || 'ubuntu-24.04' }}

    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup System (Linux/Android)
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf p7zip-full wget file

      - name: Set up JDK (Android only)
        if: ${{ (inputs.os == 'android' || github.event_name == 'push') }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK (Android only)
        if: ${{ (inputs.os == 'android' || github.event_name == 'push') }}
        uses: android-actions/setup-android@v3.2.1

      - name: Install Android NDK (Android only)
        if: ${{ (inputs.os == 'android' || github.event_name == 'push') }}
        run: yes | sdkmanager "ndk;25.2.9519653"

      - name: Apply Patches
        if: ${{ runner.os == 'Linux' }}
        run: |
          chmod +x apply_patches.sh
          ./apply_patches.sh

      - name: Build Host Tools
        if: ${{ runner.os == 'Linux' }}
        run: |
          chmod +x build_tools.sh
          # Ensure dxc-linux is executable for build_tools.sh
          chmod +x tools/XenosRecomp/thirdparty/dxc-bin/bin/x64/dxc-linux
          ./build_tools.sh

      - name: Download Game Data
        env:
          GAME_URL: ${{ inputs.game_url }}
          UPDATE_URL: ${{ inputs.update_url }}
          DLC_URL: ${{ inputs.dlc_url }}
        run: |
          mkdir -p ./UnleashedRecompLib/private
          TEMP_DATA="${{ runner.temp }}/game_data"

          if [ -n "$GAME_URL" ]; then
            echo "::add-mask::$GAME_URL"
            wget -qO "$TEMP_DATA" "$GAME_URL"

            # Check if it's an archive using 7z (handles zip, rar, 7z)
            if 7z l "$TEMP_DATA" > /dev/null 2>&1; then
               echo "Detected archive, extracting..."
               7z x -y "$TEMP_DATA" -o./UnleashedRecompLib/private/
               rm "$TEMP_DATA"
            elif [[ "$RUNNER_OS" == "Linux" ]] && file "$TEMP_DATA" | grep -qi 'iso'; then
               echo "Detected ISO file"
               mv "$TEMP_DATA" ./UnleashedRecompLib/private/game.iso
            elif [[ "$GAME_URL" == *.iso ]]; then
               echo "Detected ISO file by extension"
               mv "$TEMP_DATA" ./UnleashedRecompLib/private/game.iso
            else
               echo "Assuming XEX file"
               mv "$TEMP_DATA" ./UnleashedRecompLib/private/default.xex
            fi
          fi

          if [ -n "$UPDATE_URL" ]; then
            echo "::add-mask::$UPDATE_URL"
            wget -qO ./UnleashedRecompLib/private/default.xexp "$UPDATE_URL"
          fi

          if [ -n "$DLC_URL" ]; then
            echo "::add-mask::$DLC_URL"
            wget -qO ./UnleashedRecompLib/private/shader.ar "$DLC_URL"
          fi

      - name: Build APK (Android only)
        if: ${{ (inputs.os == 'android' || github.event_name == 'push') }}
        working-directory: android
        run: |
          chmod +x gradlew
          export ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/25.2.9519653
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Archive APK (Android only)
        if: ${{ (inputs.os == 'android' || github.event_name == 'push') }}
        run: |
          mkdir -p output/apk
          cp android/app/build/outputs/apk/release/app-release.apk output/apk/

      - name: Upload APK (Android only)
        if: ${{ (inputs.os == 'android' || github.event_name == 'push') }}
        uses: actions/upload-artifact@v4
        with:
          name: UnleashedRecomp-Android-APK
          path: output/apk/app-release.apk

      - name: Cache vcpkg (Linux/Windows)
        if: ${{ (inputs.os == 'linux') || (inputs.os == 'windows') }}
        uses: actions/cache@v4
        with:
          path: |
            ./thirdparty/vcpkg/downloads
            ./thirdparty/vcpkg/packages
          key: vcpkg-${{ inputs.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Bootstrap vcpkg (Linux/Windows)
        if: ${{ (inputs.os == 'linux') || (inputs.os == 'windows') }}
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ./thirdparty/vcpkg/bootstrap-vcpkg.bat
          else
            ./thirdparty/vcpkg/bootstrap-vcpkg.sh
          fi

      - name: Build Linux/Windows
        if: ${{ (inputs.os == 'linux') || (inputs.os == 'windows') }}
        run: |
          echo "Building for ${{ inputs.os }}"
          mkdir -p build_${{ inputs.os }}
          cd build_${{ inputs.os }}

          # Only use HOST_TOOLS_DIR on Linux/Android builds where it was populated
          HOST_TOOLS_ARG=""
          if [ -d "../build_tools/bin" ]; then
            HOST_TOOLS_ARG="-DHOST_TOOLS_DIR=../build_tools/bin"
          fi

          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="../thirdparty/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            $HOST_TOOLS_ARG

          if [ "$RUNNER_OS" == "Windows" ]; then
            cmake --build . --config Release --parallel
          else
            cmake --build . --config Release --parallel $(nproc)
          fi

      - name: Upload Artifacts (Linux/Windows)
        if: ${{ inputs.os == 'linux' || inputs.os == 'windows' }}
        uses: actions/upload-artifact@v4
        with:
          name: UnleashedRecomp-${{ inputs.os }}
          path: |
            build_${{ inputs.os }}/Release/*
            build_${{ inputs.os }}/bin/*
            build_${{ inputs.os }}/*.exe
            build_${{ inputs.os }}/${{ inputs.os == 'linux' && 'UnleashedRecomp' || '' }}
            !build_${{ inputs.os }}/**/*.o
            !build_${{ inputs.os }}/**/*.a

      - name: Cleanup
        run: |
          echo 'Cleaning up temporary files'
          rm -rf output

      - name: Notify Success
        if: success() 
        run: |
          echo 'Build and release successful!'
