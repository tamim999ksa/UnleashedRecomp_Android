name: Release
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      os:
        description: 'Target OS'
        required: true
        type: choice
        options:
          - android
          - linux
          - windows
        default: 'android'
      game_url:
        description: 'URL for game data (ISO/XEX/ZIP/7Z/RAR)'
        required: true
        type: string
      update_url:
        description: 'URL for update data (default.xexp/ZIP/7Z/RAR) (optional)'
        required: false
        type: string
      dlc_url:
        description: 'URL for dlc data (shader.ar/ZIP/7Z/RAR) (optional)'
        required: false
        type: string

jobs:
  prepare-assets:
    name: Prepare Assets
    runs-on: ubuntu-24.04
    env:
      ASSET_REPO: ${{ secrets.ASSET_REPO }}
      ASSET_REPO_TOKEN: ${{ secrets.ASSET_REPO_TOKEN }}
    outputs:
      has_assets: ${{ steps.check-assets.outputs.has_assets }}
    steps:
      - name: Maximize build space
        if: runner.os == 'Linux'
        uses: easimon/maximize-build-space@v10
        with:
          swap-size-mb: 4096
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Checkout Private Repository
        if: ${{ env.ASSET_REPO != '' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ secrets.ASSET_REPO }}
          token: ${{ secrets.ASSET_REPO_TOKEN }}
          path: private

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full wget cmake build-essential libcurl4-openssl-dev

      - name: Cache extract-xiso
        uses: actions/cache@v5
        id: cache-extract-xiso
        with:
          path: /usr/local/bin/extract-xiso
          key: extract-xiso-${{ runner.os }}-v1

      - name: Setup extract-xiso
        run: |
          if [ ! -f /usr/local/bin/extract-xiso ]; then
            git clone https://github.com/XboxDev/extract-xiso.git
            cd extract-xiso
            # Patch extract-xiso to ignore EEXIST
            sed -i "s|if ( ( err = mkdir( dir->filename, 0755 ) ) ) mkdir_err( dir->filename );|if ( ( err = mkdir( dir->filename, 0755 ) ) ) { if ( errno == EEXIST ) err = 0; else mkdir_err( dir->filename ); }|" extract-xiso.c
            sed -i "s|if ( ( err = mkdir( iso_name, 0755 ) ) ) mkdir_err( iso_name );|if ( ( err = mkdir( iso_name, 0755 ) ) ) { if ( errno == EEXIST ) err = 0; else mkdir_err( iso_name ); }|" extract-xiso.c
            mkdir build && cd build
            cmake .. -DCMAKE_BUILD_TYPE=Release
            make -j$(nproc)
            sudo make install
            cd ../..
            rm -rf extract-xiso
          fi

      - name: Download Data
        if: ${{ github.event_name == 'workflow_dispatch' || env.ASSET_REPO != '' }}
        env:
          GAME_URL: ${{ github.event.inputs && github.event.inputs.game_url }}
          UPDATE_URL: ${{ github.event.inputs && github.event.inputs.update_url }}
          DLC_URL: ${{ github.event.inputs && github.event.inputs.dlc_url }}
        run: |
          mkdir -p ./UnleashedRecompLib/private

          handle_url() {
            local url="$1"
            if [ -z "$url" ]; then return 0; fi
            echo "::add-mask::${url}"
            # Use --content-disposition to preserve original filenames
            wget --no-check-certificate --content-disposition --tries=3 --retry-connrefused --waitretry=5 -q -P ./UnleashedRecompLib/private/ "${url}"
          }

          handle_url "$GAME_URL"
          handle_url "$UPDATE_URL"
          handle_url "$DLC_URL"

          if [ -d "./private" ]; then
            cp -rv private/* ./UnleashedRecompLib/private/ 2>/dev/null || true
          fi

          # Recursive extraction
          for i in {1..15}; do
            nested=$(find ./UnleashedRecompLib/private -type f \( -iname "*.iso" -o -iname "*.7z" -o -iname "*.zip" -o -iname "*.rar" -o -iname "TU_*" -o -iname "*.tar*" -o -iregex ".*/[0-9a-fA-F]\{8,42\}" \) -not -name "*.skipped" -not -name "*.extracted" | head -n 1)
            if [ -z "$nested" ]; then break; fi

            filename=$(basename "$nested")
            extension="${filename##*.}"
            is_iso=0
            if [[ "$extension" =~ ^(iso|ISO)$ ]]; then is_iso=1; fi

            success=0
            # Try 7z first for generic archives, then specialized tools
            echo "Extracting: $nested"
            if 7z x -y "$nested" -o./UnleashedRecompLib/private/; then
              success=1
            elif [ "$is_iso" -eq 1 ] && (extract-xiso -x "$nested" -d ./UnleashedRecompLib/private/ || python3 tools/extract_xgd.py "$nested" ./UnleashedRecompLib/private/); then
              success=1
            elif [ "$is_iso" -eq 0 ] && python3 tools/extract_stfs.py "$nested" ./UnleashedRecompLib/private/; then
              success=1
            fi

            if [ "$success" -eq 1 ]; then rm -f "$nested"; else mv "$nested" "${nested}.skipped"; fi
          done

          echo "Extraction complete. Current file structure:"
          ls -R ./UnleashedRecompLib/private

          # Robust Normalization
          finalize_file() {
            local filename="$1"
            echo "Finalizing $filename..."
            local target_path="./UnleashedRecompLib/private/$filename"
            local candidates=$(find ./UnleashedRecompLib/private -type f -iname "$filename" | { grep -vFx "$target_path" || true; } || true)
            local candidate_count=$(printf "%s" "$candidates" | grep -v "^$" | wc -l || true)
            if [ "$candidate_count" -gt 0 ]; then
                echo "Found $candidate_count candidates for $filename"
                local found_file=""
                if [ "$candidate_count" -gt 1 ]; then
                    found_file=$(printf "%s" "$candidates" | grep -vE "/(game|base)/" | head -n 1)
                    if [ -z "$found_file" ]; then found_file=$(printf "%s" "$candidates" | head -n 1); fi
                else
                    found_file="$candidates"
                fi
                if [ -n "$found_file" ]; then
                    echo "Moving $found_file to $target_path"
                    mv -f "$found_file" "$target_path"
                fi
            fi
            # Case fix for root files
            local root_file=$(find ./UnleashedRecompLib/private -maxdepth 1 -type f -iname "$filename" | head -n 1)
            if [ -n "$root_file" ] && [ "$root_file" != "$target_path" ]; then
                echo "Correcting case: $root_file -> $target_path"
                mv -f "$root_file" "$target_path"
            fi
          }

          finalize_file "default.xex"
          finalize_file "default.xexp"
          finalize_file "shader.ar"

          # Cleanup empty directories
          find ./UnleashedRecompLib/private -depth -type d -empty -delete 2>/dev/null || true

      - name: Check Assets and Upload
        id: check-assets
        run: |
          if [ -f "./UnleashedRecompLib/private/default.xex" ] && [ -f "./UnleashedRecompLib/private/shader.ar" ]; then
            echo "has_assets=true" >> $GITHUB_OUTPUT
            echo "Assets found, uploading..."
          else
            echo "has_assets=false" >> $GITHUB_OUTPUT
            if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ env.ASSET_REPO }}" != "" ]; then
              echo "Error: Mandatory assets (default.xex, shader.ar) missing after extraction."
              false
            else
              echo "Warning: Mandatory assets missing."
            fi
          fi

      - name: Upload Prepared Assets
        if: steps.check-assets.outputs.has_assets == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: prepared-assets
          path: ./UnleashedRecompLib/private/
          retention-days: 1

  build:
    name: Build (${{ github.event.inputs && github.event.inputs.os || 'android' }})
    needs: prepare-assets
    if: needs.prepare-assets.outputs.has_assets == 'true'
    runs-on: ${{ (github.event.inputs && github.event.inputs.os == 'windows') && 'windows-latest' || 'ubuntu-24.04' }}
    env:
      OS: ${{ github.event.inputs && github.event.inputs.os || 'android' }}
      CMAKE_BUILD_PARALLEL_LEVEL: 1
      ANDROID_HOME: ${{ github.workspace }}/android-sdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
    defaults:
      run:
        shell: bash
    steps:
      - name: Maximize build space
        if: runner.os == 'Linux'
        uses: easimon/maximize-build-space@v10
        with:
          swap-size-mb: 4096
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download Prepared Assets
        if: needs.prepare-assets.outputs.has_assets == 'true'
        uses: actions/download-artifact@v8
        with:
          name: prepared-assets
          path: ./UnleashedRecompLib/private/

      - name: Cache vcpkg
        if: env.OS == 'android' || env.OS == 'linux'
        uses: actions/cache@v5
        with:
          path: |
            ./thirdparty/vcpkg/downloads
            ./thirdparty/vcpkg/packages
          key: vcpkg-${{ env.OS }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
              vcpkg-${{ env.OS }}-

      - name: Setup Java
        if: env.OS == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        if: env.OS == 'android'
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: env.OS == 'android'
        run: |
          # Use a specific version of cmdline-tools to avoid XML version mismatch
          # and ensure we use the correct sdkmanager
          echo y | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || echo y | sdkmanager --licenses
          sdkmanager "platform-tools" "cmdline-tools;latest"
          echo y | sdkmanager "ndk;29.0.14206865"

      - name: Bootstrap vcpkg
        if: env.OS == 'android' || env.OS == 'linux'
        run: ./thirdparty/vcpkg/bootstrap-vcpkg.sh

      - name: Setup Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libtbb-dev libcurl4-openssl-dev patchelf p7zip-full wget file ccache cmake build-essential

      - name: Setup Build Tools
        if: runner.os == 'Linux'
        run: |
          chmod +x ./build_tools.sh
          ./build_tools.sh

      - name: Apply Patches
        run: |
          chmod +x ./apply_patches.sh
          ./apply_patches.sh

      - name: Build APK (Android)
        if: env.OS == 'android'
        working-directory: android
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: 1
        run: |
          chmod +x gradlew
          export ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/29.0.14206865
          export GRADLE_OPTS="-Xmx4096m -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=1"
          ./gradlew assembleRelease --max-workers=1 --no-daemon

      - name: Build Linux
        if: env.OS == 'linux'
        run: |
          mkdir -p build_linux && cd build_linux
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="../thirdparty/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DHOST_TOOLS_DIR="../build_tools/bin"
          cmake --build . --config Release --parallel $(nproc)

      - name: Build Windows
        if: env.OS == 'windows'
        run: |
          mkdir -p build_windows && cd build_windows
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="../thirdparty/vcpkg/scripts/buildsystems/vcpkg.cmake"
          cmake --build . --config Release --parallel

      - name: Upload Android APK
        if: env.OS == 'android'
        uses: actions/upload-artifact@v7
        with:
          name: UnleashedRecomp-Android-APK
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload Desktop Artifacts
        if: env.OS == 'linux' || env.OS == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: UnleashedRecomp-${{ env.OS }}
          path: |
            build_${{ env.OS }}/Release/*
            build_${{ env.OS }}/bin/*
            build_${{ env.OS }}/*.exe
            build_${{ env.OS }}/${{ env.OS == 'linux' && 'UnleashedRecomp' || '' }}
            !build_${{ env.OS }}/**/*.o
            !build_${{ env.OS }}/**/*.a

# Added at end of file for safety, but I should probably check where to put it.
# Actually I'll just use sed to add it to the top level env.
