# Release Workflow

name: Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build APK
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Memory Optimization
        run: |
          echo 'Optimize memory usage'
          # Add memory optimization commands if necessary

      - name: Asset Handling
        run: |
          echo 'Handling assets'
          ./gradlew processReleaseResources

      - name: Archive APK
        run: |
          mkdir -p output/apk
          cp app/build/outputs/apk/release/app-release.apk output/apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-release
          path: output/apk/app-release.apk

      - name: Cleanup
        run: |
          echo 'Cleaning up temporary files'
          rm -rf output

      - name: Notify Success
        if: success() 
        run: |
          echo 'Build and release successful!'
