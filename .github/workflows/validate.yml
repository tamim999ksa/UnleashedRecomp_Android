name: validate
on:
  workflow_call:
    secrets:
      ASSET_REPO:
        required: false
      ASSET_REPO_TOKEN:
        required: false
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-24.04
    env:
      ASSET_REPO: ${{ secrets.ASSET_REPO }}
      ASSET_REPO_TOKEN: ${{ secrets.ASSET_REPO_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup System
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf p7zip-full wget file ccache libtbb-dev libcurl4-openssl-dev

      - name: Check Secrets
        if: env.ASSET_REPO == ''
        run: echo "ASSET_REPO secret is missing. Skipping Android build steps."

      - name: Checkout Private Repository
        if: env.ASSET_REPO != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ASSET_REPO }}
          token: ${{ env.ASSET_REPO_TOKEN }}
          path: ./private

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.1

      - name: Install Android NDK
        run: echo y | sdkmanager "ndk;29.0.14206865"

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ./thirdparty/vcpkg/downloads
            ./thirdparty/vcpkg/packages
          key: vcpkg-android-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
              vcpkg-android-

      - name: Bootstrap vcpkg
        run: |
          ./thirdparty/vcpkg/bootstrap-vcpkg.sh

      - name: Apply Patches
        run: |
          chmod +x apply_patches.sh
          ./apply_patches.sh

      - name: Run Build Tools
        run: |
          chmod +x ./build_tools.sh
          ./build_tools.sh

      - name: Prepare Project

          if: env.ASSET_REPO != ''
        run: |
          mkdir -p ./UnleashedRecompLib/private

          if [ -d "./private" ] && [ "$(ls -A ./private)" ]; then
            echo "Listing private directory contents for debugging:"
            find ./private -maxdepth 3

            echo "Searching for default.xex..."
            find ./private -maxdepth 4 -iname "default.xex" -exec cp {} ./UnleashedRecompLib/private/default.xex \;

            echo "Searching for default.xexp..."
            find ./private -maxdepth 4 -iname "default.xexp" -exec cp {} ./UnleashedRecompLib/private/default.xexp \;

            echo "Searching for shader.ar..."
            find ./private -maxdepth 4 -iname "shader.ar" -exec cp {} ./UnleashedRecompLib/private/shader.ar \;
          else
            echo "Private directory is empty or does not exist."
          fi

          if [ ! -f "./UnleashedRecompLib/private/default.xex" ]; then
            echo "Error: default.xex not found in UnleashedRecompLib/private/ or ASSET_REPO."
            exit 1
          fi
          if [ ! -f "./UnleashedRecompLib/private/default.xexp" ]; then
            echo "Warning: default.xexp not found in UnleashedRecompLib/private/ or ASSET_REPO."
          fi
          if [ ! -f "./UnleashedRecompLib/private/shader.ar" ]; then
            echo "Warning: shader.ar not found in UnleashedRecompLib/private/ or ASSET_REPO."
          fi

          echo "Assets prepared successfully."
          ls -l ./UnleashedRecompLib/private/

      - name: Build Debug APK
        if: env.ASSET_REPO != ''
        working-directory: ./android
        run: |
          chmod +x gradlew
          export ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/29.0.14206865
          ./gradlew assembleDebug

      - name: Upload Debug Artifact
        if: env.ASSET_REPO != ''
        uses: actions/upload-artifact@v4
        with:
          name: UnleashedRecomp-Android-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Build Release APK
        if: env.ASSET_REPO != ''
        working-directory: ./android
        run: |
          chmod +x gradlew
          export ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/29.0.14206865
          ./gradlew assembleRelease

      - name: Upload Release Artifact
        if: env.ASSET_REPO != ''
        uses: actions/upload-artifact@v4
        with:
          name: UnleashedRecomp-Android-Release
          path: android/app/build/outputs/apk/release/app-release.apk
